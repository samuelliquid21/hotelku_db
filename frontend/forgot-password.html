<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Password - Hotelku</title>
    <meta name="description" content="Hotelku - Lupa password. Ajukan reset password ke admin.">
    <meta name="author" content="Kelompok Basis Data UPNVJ">
    <meta property="og:title" content="Hotelku - Lupa Password">
    <meta property="og:description" content="Ajukan reset password akun Hotelku Anda.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>🏨</text></svg>">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .forgot-card { background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); max-width: 420px; width: 100%; overflow: hidden; }
        .forgot-header { background: linear-gradient(135deg, #1A1513, #2a2018); padding: 30px; text-align: center; }
        .forgot-header h2 { color: #C5A059; font-size: 22px; }
        .forgot-header p { color: #8A7E72; font-size: 13px; margin-top: 6px; }
        .forgot-body { padding: 30px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; color: #666; margin-bottom: 4px; font-weight: 600; }
        .form-group input { width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        .form-group input:focus { outline: none; border-color: #C5A059; }
        .btn-submit { width: 100%; padding: 14px; background: #C5A059; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; }
        .btn-submit:hover { background: #b8904a; }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
        .alert { padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; display: none; }
        .alert-success { background: #d4edda; color: #155724; display: block; }
        .alert-error { background: #f8d7da; color: #721c24; display: block; }
        .alert-info { background: #d1ecf1; color: #0c5460; display: block; }
        .nav-link { display: block; text-align: center; margin-top: 16px; color: #999; text-decoration: none; font-size: 13px; }
        .nav-link:hover { color: #C5A059; }
        .step { display: none; }
        .step.active { display: block; }
    </style>
</head>
<body>
    <div class="forgot-card">
        <div class="forgot-header">
            <h2>🔑 Lupa Password</h2>
            <p>Ajukan reset password ke admin Hotelku</p>
        </div>
        <div class="forgot-body">
            <div id="alertBox" class="alert"></div>

            <div id="step1" class="step active">
                <form id="forgotForm">
                    <div class="form-group">
                        <label>Email Terdaftar</label>
                        <input type="email" id="resetEmail" placeholder="contoh@email.com" required>
                    </div>
                    <button type="submit" class="btn-submit" id="btnSend">Kirim Permintaan</button>
                </form>
                <a href="sign-in.html" class="nav-link">← Kembali ke Login</a>
            </div>

            <div id="step2" class="step">
                <div style="text-align:center;padding:20px 0;">
                    <div style="font-size:48px;margin-bottom:16px;">✅</div>
                    <h3 style="color:#1A1513;margin-bottom:8px;">Permintaan Terkirim!</h3>
                    <p style="color:#666;font-size:14px;line-height:1.6;">
                        Permintaan reset password Anda telah dikirim ke admin.<br>
                        Silakan tunggu persetujuan dari admin.<br>
                        Cek halaman ini secara berkala untuk melanjutkan.
                    </p>
                    <button onclick="showStep3()" class="btn-submit" style="margin-top:16px;border:none;cursor:pointer;padding:12px 32px;">Sudah Disetujui? Atur Password Baru</button>
                    <br>
                    <a href="sign-in.html" class="nav-link" style="margin-top:12px;display:inline-block;">← Kembali ke Login</a>
                </div>
            </div>

            <div id="step3" class="step">
                <form id="newPasswordForm">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="resetEmailConfirm" readonly required>
                    </div>
                    <div class="form-group">
                        <label>Password Baru</label>
                        <input type="password" id="newPassword" placeholder="Minimal 6 karakter" minlength="6" required>
                    </div>
                    <div class="form-group">
                        <label>Konfirmasi Password</label>
                        <input type="password" id="confirmPassword" placeholder="Ulangi password baru" minlength="6" required>
                    </div>
                    <button type="submit" class="btn-submit" id="btnSetPass">Atur Password Baru</button>
                </form>
                <a href="sign-in.html" class="nav-link">← Kembali ke Login</a>
            </div>
        </div>
    </div>

    <script>
    const API_BASE = '../backend/api';
    let pendingEmail = '';

    document.getElementById('forgotForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnSend');
        const email = document.getElementById('resetEmail').value.trim();

        if (!email) { showAlert('Masukkan email terdaftar.', 'error'); return; }

        btn.disabled = true;
        btn.textContent = '⏳ Mengirim...';

        try {
            const res = await fetch(API_BASE + '/auth.php?action=forgot_password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            const data = await res.json();

            if (data.status === 'success') {
                pendingEmail = email;
                document.getElementById('step1').classList.remove('active');
                document.getElementById('step2').classList.add('active');
            } else {
                showAlert(data.message || 'Gagal mengirim permintaan', 'error');
                btn.disabled = false;
                btn.textContent = 'Kirim Permintaan';
            }
        } catch (e) {
            showAlert('Gagal terhubung ke server.', 'error');
            btn.disabled = false;
            btn.textContent = 'Kirim Permintaan';
        }
    });

    function showStep3() {
        document.getElementById('resetEmailConfirm').value = pendingEmail;
        document.getElementById('step2').classList.remove('active');
        document.getElementById('step3').classList.add('active');
    }

    document.getElementById('newPasswordForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnSetPass');
        const email = document.getElementById('resetEmailConfirm').value.trim();
        const pass = document.getElementById('newPassword').value;
        const confirm = document.getElementById('confirmPassword').value;

        if (pass.length < 6) { showAlert('Password minimal 6 karakter.', 'error'); return; }
        if (pass !== confirm) { showAlert('Konfirmasi password tidak cocok.', 'error'); return; }

        btn.disabled = true;
        btn.textContent = '⏳ Menyimpan...';

        try {
            const res = await fetch(API_BASE + '/auth.php?action=set_new_password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password_baru: pass })
            });
            const data = await res.json();

            if (data.status === 'success') {
                showAlert('Password berhasil direset! Silakan login.', 'success');
                setTimeout(() => { window.location.href = 'sign-in.html'; }, 2000);
            } else {
                showAlert(data.message || 'Gagal mereset password', 'error');
                btn.disabled = false;
                btn.textContent = 'Atur Password Baru';
            }
        } catch (e) {
            showAlert('Gagal terhubung ke server.', 'error');
            btn.disabled = false;
            btn.textContent = 'Atur Password Baru';
        }
    });

    function showAlert(msg, type) {
        const box = document.getElementById('alertBox');
        box.textContent = msg;
        box.className = 'alert alert-' + type;
        box.style.display = 'block';
        setTimeout(() => { box.style.display = 'none'; }, 5000);
    }
    </script>
</body>
</html>
